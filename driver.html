<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Wayfare Driver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root{ --maroon:#6E1023; --gold:#C2902B; --gold2:#E3B23C; --ink:#2A1216; --paper:#F7F0E6; --card:#FFFDF8;
         --line:rgba(110,16,35,.12); --soft:#9b8b80; --green:#1F6E5E; --disp:'Bricolage Grotesque',sans-serif; --body:'Inter',sans-serif; }
  *{box-sizing:border-box} body{ margin:0; font-family:var(--body); color:var(--ink); background:var(--paper); }
  .disp{ font-family:var(--disp); }
  header{ background:var(--maroon); color:#fff; padding:14px 16px; display:flex; align-items:center; gap:10px; }
  header .logo{ width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--gold2),var(--gold));display:grid;place-items:center;color:var(--maroon);font-weight:800;}
  header h1{ font-family:var(--disp); font-size:17px; margin:0; font-weight:800; }
  header .net{ margin-left:auto; font-size:11.5px; display:flex; align-items:center; gap:6px; }
  .dot{ width:8px;height:8px;border-radius:50%; background:#E3B23C; } .dot.on{ background:#7BD389; } .dot.off{ background:#E36B6B; }
  .wrap{ max-width:520px; margin:0 auto; padding:16px; padding-bottom:40px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:13px; }
  .btn{ font-family:var(--body); font-weight:700; font-size:15px; width:100%; border:0; border-radius:13px; padding:14px; cursor:pointer; }
  .btn-maroon{ background:var(--maroon); color:#fff; } .btn-green{ background:var(--green); color:#fff; } .btn-gold{ background:var(--gold); color:#fff; }
  .btn-ghost{ background:#fff; color:var(--maroon); border:1.5px solid var(--line); }
  .btn:active{ transform:translateY(1px); }
  .field{ width:100%; font-family:var(--body); font-size:18px; text-align:center; letter-spacing:.3em; padding:14px; border:1.5px solid var(--line); border-radius:12px; }
  .pill{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:20px; }
  .st-assigned{ background:#E7EEF8;color:#1A5CA8;} .st-en_route,.st-arrived{ background:#FBEFD7;color:#9A6B12;} .st-picked_up,.st-in_transit{ background:#E4F2EE;color:#1F6E5E;} .st-completed{ background:#E8E8E8;color:#555;}
  .row{ display:flex; gap:9px; } .mt{ margin-top:11px; }
  .pickup{ border-left:4px solid var(--gold); }
  .muted{ color:var(--soft); font-size:12.5px; }
  .big{ font-family:var(--disp); font-size:22px; font-weight:800; }
  .step{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--soft); margin:2px 0; }
  .step.done{ color:var(--green); font-weight:600; } .step .b{ width:18px;height:18px;border-radius:50%;border:2px solid currentColor;display:grid;place-items:center;font-size:10px; }
  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(12px); opacity:0; visibility:hidden; pointer-events:none; background:var(--ink); color:#fff; padding:12px 18px; border-radius:12px; font-weight:600; transition:transform .25s, opacity .25s; z-index:999; }
  .toast.show{ transform:translateX(-50%) translateY(0); opacity:1; visibility:visible; }
  .toast.show{ transform:translateX(-50%) translateY(0); }
  .cm-item{ display:block; width:100%; text-align:left; background:#fff; border:0; border-bottom:1px solid var(--line); padding:11px 13px; font-family:var(--body); font-size:13.5px; cursor:pointer; color:var(--ink); }
  .cm-item:last-child{ border-bottom:0; }
  .cm-item:hover{ background:#FBF7EF; }
  .modal{ position:fixed; inset:0; z-index:2500; background:rgba(42,18,22,.5); display:none; align-items:center; justify-content:center; padding:18px; }
  .modal.show{ display:flex; }
  .modal .sheet{ background:#fff; border-radius:16px; width:100%; max-width:440px; max-height:90vh; overflow:auto; box-shadow:0 24px 60px rgba(0,0,0,.4); }
  .modal .hd{ display:flex; align-items:center; justify-content:space-between; padding:15px 18px; border-bottom:1px solid var(--line); }
  .modal .hd h3{ font-family:var(--disp); margin:0; font-size:18px; font-weight:800; }
  .modal .bd{ padding:18px; }
  .modal .x{ background:none; border:0; font-size:20px; cursor:pointer; color:var(--soft); }
  .fld{ display:block; font-size:12px; font-weight:600; color:var(--soft); margin:13px 0 5px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .input{ font-family:var(--body); font-size:14px; padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--ink); box-sizing:border-box; }
  .input:focus{ outline:2px solid var(--gold); }
</style>
</head>
<body>
  <header><div class="logo">W</div><h1 id="htitle">Wayfare Driver</h1><div class="net"><span class="dot" id="netdot"></span><span id="netlabel">…</span></div></header>
  <div id="app" class="wrap"></div>
  <div class="toast" id="toast"></div>
  <audio id="remoteAudio" autoplay playsinline></audio>
  <div id="callOverlay" style="display:none;position:fixed;inset:0;z-index:3000;background:rgba(42,18,22,.94);color:#fff;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:24px">
    <div style="width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,#E3B23C,#C2902B);color:#6E1023;display:grid;place-items:center;font-weight:800;font-size:30px">📞</div>
    <div><div id="callName" style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px"></div><div id="callState" style="opacity:.8;font-size:14px;margin-top:4px"></div></div>
    <div style="font-size:12px;opacity:.6;max-width:280px">Private app-to-app call — no numbers shared.<br>Both apps must be open · uses mic + data.</div>
    <div id="callButtons" style="display:flex;gap:22px;margin-top:6px">
      <button id="acceptBtn" onclick="acceptCall()" style="background:#1F6E5E;color:#fff;border:0;border-radius:999px;width:64px;height:64px;font-size:26px;cursor:pointer">📞</button>
      <button onclick="hangUp()" style="background:#B42318;color:#fff;border:0;border-radius:999px;width:64px;height:64px;font-size:26px;cursor:pointer">📵</button>
    </div>
  </div>
<script>
const SERVER_URL="https://wayfare-relay.onrender.com"; // ← your Render relay URL
let GUESTS={}, DRIVERS={}, SETTINGS={locFreqSec:8}, VENUE={name:"Venue",lat:40.5188,lng:-74.3294};
let me=null, net={connected:false}, watchId=null, selGuest=null;
const $=s=>document.querySelector(s);
const save=k=>localStorage.setItem("wf_driver",k), load=()=>localStorage.getItem("wf_driver");

let socket=null;
try{ socket=io(SERVER_URL,{transports:["websocket","polling"]});
  socket.on("connect",()=>{net.connected=true;paintNet(); if(me){socket.emit("driverHello",{id:me.id});}});
  socket.on("disconnect",()=>{net.connected=false;paintNet();});
  socket.on("connect_error",()=>{net.connected=false;paintNet();});
  socket.on("snapshot",s=>{ if(!s)return; GUESTS=s.guests||{}; DRIVERS=s.drivers||{}; if(s.settings)SETTINGS=s.settings; if(s.venue)VENUE=s.venue; if(me&&DRIVERS[me.id])me=DRIVERS[me.id]; render(); checkNewTasks(); });
  socket.on("settings",s=>{ if(s) SETTINGS=s; });
  socket.on("guest",g=>{ if(g&&g.id){GUESTS[g.id]=g; render(); checkNewTasks();} });
  socket.on("guestGone",({id})=>{ delete GUESTS[id]; render(); });
  socket.on("driver",d=>{ if(d&&d.id){DRIVERS[d.id]=d; if(me&&d.id===me.id)me=d;} });
  socket.on("youAre",d=>{ me=d; save(d.id); render(); });
}catch(e){console.error(e);}
function paintNet(){ const d=$("#netdot"),l=$("#netlabel"); if(d){d.className="dot "+(net.connected?"on":"off"); l.textContent=net.connected?"Connected":"Offline";} }
/* ---- new-task alert: beep + banner when a pickup is newly assigned to me ---- */
let knownAssigned=null;
function beep(){ try{ const a=new (window.AudioContext||window.webkitAudioContext)(); const o=a.createOscillator(), g=a.createGain(); o.connect(g); g.connect(a.destination); o.type="sine"; o.frequency.value=880; g.gain.setValueAtTime(.001,a.currentTime); g.gain.exponentialRampToValueAtTime(.3,a.currentTime+.02); g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.5); o.start(); o.stop(a.currentTime+.52); }catch(e){} }
function checkNewTasks(){
  if(!me) return; const ids=new Set(myPickups().map(g=>g.id));
  if(knownAssigned===null){ knownAssigned=ids; return; }
  let fresh=null; ids.forEach(id=>{ if(!knownAssigned.has(id)) fresh=id; });
  knownAssigned=ids;
  if(fresh){ const g=GUESTS[fresh]; beep(); newTaskBanner(g?gname(g):"A guest"); if(navigator.vibrate) navigator.vibrate([200,100,200]); }
}
function newTaskBanner(name){ let b=$("#newtask"); if(!b){ b=document.createElement("div"); b.id="newtask"; b.onclick=()=>{ b.remove(); }; document.body.appendChild(b); }
  b.style.cssText="position:fixed;top:0;left:0;right:0;z-index:4000;background:#1F6E5E;color:#fff;padding:13px 16px;font-weight:700;font-size:14px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.3);cursor:pointer";
  b.textContent="🔔 New pickup assigned: "+name+" — tap to dismiss";
  setTimeout(()=>{ if(b) b.remove(); }, 8000); }

/* ---------- Click-to-call: WebRTC peer-to-peer audio (open-source, free STUN) ---------- */
// Optional TURN relay for strict networks. Self-host coturn (free, open-source) and fill these in.
// Leave url:"" to use free STUN only (works on most WiFi/cellular).
const TURN={ url:"", username:"", credential:"" }; // e.g. url:"turn:YOUR_SERVER:3478"
const ICE={ iceServers:[
  {urls:"stun:stun.l.google.com:19302"},
  {urls:"stun:stun1.l.google.com:19302"},
  ...(TURN.url?[{urls:TURN.url,username:TURN.username,credential:TURN.credential}]:[])
] };
let pc=null, localStream=null, pendingOffer=null, callPeer=null; // callPeer={guestId,driverId}
function callUI(show,name,state,showAccept){ const o=$("#callOverlay"); if(!o)return; o.style.display=show?"flex":"none"; if(name!=null)$("#callName").textContent=name; if(state!=null)$("#callState").textContent=state; $("#acceptBtn").style.display=showAccept?"block":"none"; }
async function makePc(){
  pc=new RTCPeerConnection(ICE);
  localStream=await navigator.mediaDevices.getUserMedia({audio:true});
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack=e=>{ $("#remoteAudio").srcObject=e.streams[0]; callUI(true,null,"Connected",false); };
  pc.onicecandidate=e=>{ if(e.candidate&&callPeer) socket.emit("callIce",{target:"guest",guestId:callPeer.guestId,driverId:callPeer.driverId,candidate:e.candidate}); };
  pc.onconnectionstatechange=()=>{ if(["disconnected","failed","closed"].includes(pc.connectionState)) hangUp(); };
}
// Driver calls a guest (outgoing)
async function callGuest(guestId){
  const g=GUESTS[guestId]; if(!g){ return; } callPeer={ guestId, driverId:me.id };
  try{
    callUI(true, gname(g)||"Guest", "Calling…", false);
    await makePc();
    const offer=await pc.createOffer(); await pc.setLocalDescription(offer);
    socket.emit("callOffer",{target:"guest",guestId,driverId:me.id,sdp:offer,name:me.name});
  }catch(e){ toast("Allow microphone to call"); hangUp(); }
}
// Incoming call from a guest (offer arrives)
socket.on("callOffer", async m=>{
  if(!m) return; callPeer={ guestId:m.guestId, driverId:m.driverId||me?.id }; pendingOffer=m;
  callUI(true, m.name||"Guest", "Incoming call…", true);
  socket.emit("callRinging",{target:"guest",guestId:m.guestId,driverId:callPeer.driverId});
});
async function acceptCall(){
  if(!pendingOffer) return;
  try{
    await makePc();
    await pc.setRemoteDescription(pendingOffer.sdp);
    const answer=await pc.createAnswer(); await pc.setLocalDescription(answer);
    socket.emit("callAnswer",{target:"guest",guestId:callPeer.guestId,driverId:callPeer.driverId,sdp:answer});
    pendingOffer=null; callUI(true,null,"Connected",false);
  }catch(e){ toast("Allow microphone to answer"); hangUp(); }
}
function hangUp(){ try{ if(pc) pc.close(); }catch(e){} pc=null; if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  if(callPeer) socket.emit("callEnd",{target:"guest",guestId:callPeer.guestId,driverId:callPeer.driverId}); pendingOffer=null; callPeer=null; callUI(false); }
socket.on("callAnswer", async m=>{ if(pc&&m&&m.sdp){ try{ await pc.setRemoteDescription(m.sdp); callUI(true,null,"Connected",false); }catch(e){} } });
socket.on("callIce", async m=>{ if(pc&&m&&m.candidate){ try{ await pc.addIceCandidate(m.candidate); }catch(e){} } });
socket.on("callRinging", ()=> callUI(true,null,"Ringing…",false));
socket.on("callEnd", ()=> hangUp());
socket.on("callDecline", ()=> hangUp());

function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(window._t); window._t=setTimeout(()=>t.classList.remove("show"),2200); }
function gname(g){ return (g.firstName||"")+" "+(g.lastName||""); }
function myPickups(){ return Object.values(GUESTS).filter(g=>g.driverId===me?.id && !["completed","cancelled"].includes(g.status)).sort((a,b)=>(a.pickupTime||"").localeCompare(b.pickupTime||"")); }

/* ---- login ---- */
function tryRestore(){ const id=load(); if(id){ // wait for snapshot then identify
  const t=setInterval(()=>{ if(DRIVERS[id]){ me=DRIVERS[id]; clearInterval(t); render(); } },300); setTimeout(()=>clearInterval(t),4000); } }
function login(){ const code=($("#code")?.value||"").trim(); const d=Object.values(DRIVERS).find(x=>x.code===code); if(!d){ toast("Wrong code"); return; } me=d; save(d.id); socket?.emit("driverHello",{id:d.id}); render(); }
function logout(){ stopShare(); me=null; localStorage.removeItem("wf_driver"); render(); }

/* ---- GPS ---- */
function startShare(){ if(!navigator.geolocation){toast("No GPS");return;}
  if(watchId!=null) return;
  watchId=navigator.geolocation.watchPosition(p=>{ const lat=p.coords.latitude,lng=p.coords.longitude,heading=p.coords.heading||0;
    window._lastFix={lat,lng,heading};
    const now=Date.now(); const freqMs=(SETTINGS.locFreqSec||8)*1000;
    if(now-(window._lastEmit||0) >= freqMs){ window._lastEmit=now; if(me) socket?.emit("driverLoc",{id:me.id,lat,lng,heading}); }
    paintShare(); },
    err=>{ toast("Location error — allow GPS"); }, {enableHighAccuracy:true,maximumAge:2000,timeout:12000});
  paintShare();
}
function stopShare(){ if(watchId!=null){ navigator.geolocation.clearWatch(watchId); watchId=null; } paintShare(); }
function paintShare(){ const el=$("#share-pill"); if(el) el.outerHTML=sharePill(); }
function sharePill(){ return watchId!=null
  ? `<span id="share-pill" class="pill st-picked_up"><span class="dot on"></span>Sharing location</span>`
  : `<span id="share-pill" class="pill st-completed">Not sharing</span>`; }

/* ---- trip status ---- */
function setStatus(guestId,status){ socket?.emit("guestStatus",{guestId,status});
  if(status==="en_route") startShare();
  if(status==="completed"){ const left=myPickups().filter(g=>g.id!==guestId).length; if(!left) stopShare(); selGuest=(status==="completed")?null:selGuest; }
  toast("Updated: "+status.replace("_"," ")); setTimeout(render,150);
}
function navTo(g){ const t=["picked_up","in_transit"].includes(g.status)?[VENUE.lat,VENUE.lng]:[g.pickupLat,g.pickupLng]; window.open(`https://www.google.com/maps/dir/?api=1&destination=${t[0]},${t[1]}`,"_blank"); }

/* ---- call menu (cellular default + WebRTC option) ---- */
function toggleCallMenu(ev){ if(ev) ev.stopPropagation(); const m=$("#callmenu"); if(m) m.style.display=(m.style.display==="none"?"block":"none"); }
function closeCallMenu(){ const m=$("#callmenu"); if(m) m.style.display="none"; }
function cellCall(num){ closeCallMenu(); if(!num){ toast("No mobile number on file"); return; } window.location.href="tel:"+num.replace(/[^+0-9]/g,""); }
document.addEventListener("click",e=>{ const m=$("#callmenu"); if(m&&m.style.display==="block"&&!e.target.closest("#callmenu")&&!(e.target.textContent==="▾")) m.style.display="none"; });

/* ---- driver edits own name / vehicle ---- */
function openProfile(){ if(!me) return; const v=me.vehicle||{};
  const html=`<div class="hd"><h3>My profile</h3><button class="x" onclick="closeProfile()">✕</button></div>
  <div class="bd">
    <label class="fld">Driver name</label><input class="input" id="pf-name" style="width:100%" value="${me.name||""}"/>
    <div class="grid2"><div><label class="fld">Make</label><input class="input" id="pf-make" style="width:100%" value="${v.make||""}"/></div>
    <div><label class="fld">Model</label><input class="input" id="pf-model" style="width:100%" value="${v.model||""}"/></div></div>
    <div class="grid2"><div><label class="fld">Color</label><input class="input" id="pf-color" style="width:100%" value="${v.color||""}"/></div>
    <div><label class="fld">Plate</label><input class="input" id="pf-plate" style="width:100%" value="${v.plate||""}"/></div></div>
    <button class="btn btn-maroon" style="width:100%;margin-top:16px" onclick="saveProfile()">Save profile</button>
  </div>`;
  let m=$("#profileModal"); if(!m){ m=document.createElement("div"); m.id="profileModal"; m.className="modal"; m.innerHTML=`<div class="sheet"></div>`; document.body.appendChild(m); }
  m.querySelector(".sheet").innerHTML=html; m.classList.add("show");
}
function closeProfile(){ const m=$("#profileModal"); if(m) m.classList.remove("show"); }
function saveProfile(){ if(!me) return;
  const name=$("#pf-name").value.trim()||me.name;
  const vehicle={ ...(me.vehicle||{}), make:$("#pf-make").value.trim(), model:$("#pf-model").value.trim(), color:$("#pf-color").value.trim(), plate:$("#pf-plate").value.trim() };
  socket?.emit("saveDriver",{ id:me.id, name, vehicle },(res)=>{ if(res&&res.ok){ me=res.driver||{...me,name,vehicle}; toast("Profile updated"); closeProfile(); render(); } else toast("Save failed"); });
}

/* ---- render ---- */
function render(){ paintNet();
  if(!me) return renderLogin();
  if(selGuest && GUESTS[selGuest]) return renderTrip(GUESTS[selGuest]);
  return renderList();
}
function renderLogin(){ $("#htitle").textContent="Wayfare Driver";
  $("#app").innerHTML=`<div class="card" style="margin-top:24px">
    <div class="big">Driver sign-in</div>
    <p class="muted mt">Enter the 4-digit code from your dispatcher.</p>
    <input class="field mt" id="code" inputmode="numeric" placeholder="0000" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn btn-maroon mt" onclick="login()">Sign in</button>
    <p class="muted mt" style="text-align:center">Demo codes: 1111 · 2222 · 3333</p>
  </div>`;
  if(!Object.keys(DRIVERS).length){ const t=setInterval(()=>{ if(Object.keys(DRIVERS).length){clearInterval(t);} },400); }
  tryRestore();
}
function renderList(){ $("#htitle").textContent=me.name.split(" ")[0]+"'s pickups";
  const list=myPickups();
  $("#app").innerHTML=`
    <div class="card" style="display:flex;align-items:center;gap:11px">
      <div style="width:42px;height:42px;border-radius:50%;background:var(--maroon);color:#fff;display:grid;place-items:center;font-weight:700">${me.name.split(" ").map(x=>x[0]).join("").slice(0,2)}</div>
      <div style="flex:1"><b>${me.name}</b><div class="muted">${me.vehicle.color} ${me.vehicle.make} ${me.vehicle.model} · ${me.vehicle.plate}</div></div>
      <button class="icon-btn" title="Edit my profile" onclick="openProfile()" style="background:none;border:1px solid var(--line);border-radius:8px;width:34px;height:34px;cursor:pointer">✎</button>
      ${sharePill()}
    </div>
    <div class="disp" style="font-size:18px;margin:6px 2px 10px">Assigned pickups · ${list.length}</div>
    ${list.length?list.map(g=>`
      <div class="card pickup" onclick="selGuest='${g.id}';render()" style="cursor:pointer">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1"><b style="font-size:16px">${gname(g)}</b><div class="muted">${g.pickupTime||""} · ${g.passengers||1} pax · ${g.bags||0} bags</div></div>
          <span class="pill st-${g.status}">${g.status.replace("_"," ")}</span>
        </div>
        <div class="mt" style="font-size:13.5px">📍 ${g.pickupAddress||"—"}</div>
        ${g.instructions?`<div class="muted mt">📝 ${g.instructions}</div>`:""}
      </div>`).join(""):`<div class="card" style="text-align:center;color:var(--soft)">No pickups assigned yet. Your dispatcher will add them here.</div>`}
    <button class="btn btn-ghost mt" onclick="logout()">Log out</button>`;
}
function renderTrip(g){ $("#htitle").textContent="Pickup";
  const steps=["en_route","arrived","picked_up","completed"]; const order={assigned:0,en_route:1,arrived:2,picked_up:3,in_transit:3,completed:4};
  const cur=order[g.status]??0;
  $("#app").innerHTML=`
    <button class="btn btn-ghost" onclick="selGuest=null;render()" style="width:auto;padding:8px 14px">‹ All pickups</button>
    <div class="card mt">
      <div style="display:flex;align-items:center;gap:8px"><div class="big" style="flex:1">${gname(g)}</div><span class="pill st-${g.status}">${g.status.replace("_"," ")}</span></div>
      <div class="muted mt">📞 ${g.mobile||"—"} · ${g.passengers||1} pax · ${g.bags||0} bags</div>
      <div class="mt" style="font-size:14px">📍 <b>Pickup:</b> ${g.pickupAddress||"—"}</div>
      <div style="font-size:14px">🏁 <b>Destination:</b> ${g.destination||VENUE.name}</div>
      ${g.instructions?`<div class="mt" style="background:#FBEFD7;color:#9A6B12;padding:9px 11px;border-radius:10px;font-size:13px">📝 ${g.instructions}</div>`:""}
      <div class="row mt">
        <button class="btn btn-ghost" onclick="navTo(GUESTS['${g.id}'])">🧭 Navigate</button>
        <div style="position:relative;display:flex">
          <a class="btn btn-ghost" style="border-radius:10px 0 0 10px" href="${g.mobile?('tel:'+g.mobile.replace(/[^+0-9]/g,'')):'#'}" ${g.mobile?'':'onclick="toast(\'No mobile number on file\');return false"'}>📞 Call</a>
          <button class="btn btn-ghost" style="border-radius:0 10px 10px 0;border-left:0;padding:9px 10px" onclick="toggleCallMenu(event)">▾</button>
          <div id="callmenu" style="display:none;position:absolute;top:100%;right:0;margin-top:4px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:50;min-width:190px;overflow:hidden">
            <button class="cm-item" onclick="cellCall('${g.mobile||''}')">📱 Cellular call ${g.mobile?'':'(no number)'}</button>
            <button class="cm-item" onclick="closeCallMenu();callGuest('${g.id}')">📶 In-app call (free, WebRTC)</button>
          </div>
        </div>
      </div>
      <div class="muted" style="font-size:11.5px;margin-top:6px">Cellular is the default. Use ▾ for a free in-app call (guest must have their tracking page open).</div>
    </div>
    <div class="card">
      <div class="disp" style="font-size:16px;margin-bottom:8px">Trip progress</div>
      ${[["en_route","Start trip — en route"],["arrived","Arrived at pickup"],["picked_up","Guest picked up"],["completed","Dropped off — complete"]].map((s,i)=>`<div class="step ${cur>i?'done':''}"><span class="b">${cur>i?'✓':i+1}</span>${s[1]}</div>`).join("")}
      <div class="mt">${nextAction(g,cur)}</div>
      <div class="mt" style="text-align:center">${sharePill()}</div>
    </div>`;
}
function nextAction(g,cur){
  if(cur<1) return `<button class="btn btn-green" onclick="setStatus('${g.id}','en_route')">▶ Start trip (en route)</button>`;
  if(cur<2) return `<button class="btn btn-gold" onclick="setStatus('${g.id}','arrived')">📍 I've arrived</button>`;
  if(cur<3) return `<button class="btn btn-maroon" onclick="setStatus('${g.id}','picked_up')">✓ Guest picked up</button>`;
  if(cur<4) return `<button class="btn btn-green" onclick="setStatus('${g.id}','completed')">🏁 Drop-off complete</button>`;
  return `<div class="muted" style="text-align:center">Trip complete.</div>`;
}
render();
</script>
</body>
</html>
