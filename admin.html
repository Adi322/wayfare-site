<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Wayfare — Dispatch & Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root{ --maroon:#6E1023; --maroon2:#8a1c33; --gold:#C2902B; --gold2:#E3B23C; --ink:#2A1216;
         --paper:#F7F0E6; --card:#FFFDF8; --line:rgba(110,16,35,.12); --soft:#9b8b80;
         --green:#1F6E5E; --blue:#1A5CA8; --disp:'Bricolage Grotesque',sans-serif; --body:'Inter',sans-serif; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:var(--body); color:var(--ink); background:var(--paper);
        background-image:radial-gradient(rgba(110,16,35,.05) 1px,transparent 1px); background-size:22px 22px; }
  .disp{ font-family:var(--disp); }
  a{ color:var(--maroon); }

  /* top bar */
  header{ position:sticky; top:0; z-index:1000; background:var(--maroon); color:#fff; display:flex; align-items:center; gap:14px; padding:11px 18px; box-shadow:0 2px 14px rgba(110,16,35,.25); }
  .logo{ width:30px;height:30px;border-radius:8px; background:linear-gradient(135deg,var(--gold2),var(--gold)); display:grid;place-items:center; color:var(--maroon); font-weight:800; }
  header h1{ font-family:var(--disp); font-size:18px; margin:0; font-weight:800; letter-spacing:-.01em; }
  header .sub{ font-size:11.5px; opacity:.8; margin-left:-8px; }
  .net{ margin-left:auto; font-size:12px; display:flex; align-items:center; gap:7px; }
  .dot{ width:9px;height:9px;border-radius:50%; background:#E3B23C; }
  .dot.on{ background:#7BD389; } .dot.off{ background:#E36B6B; }

  nav{ display:flex; gap:2px; padding:0 14px; background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:52px; z-index:900; overflow-x:auto; }
  nav button{ font-family:var(--body); font-weight:600; font-size:14px; border:0; background:transparent; color:var(--soft); padding:13px 16px; cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; }
  nav button.on{ color:var(--maroon); border-bottom-color:var(--maroon); }

  .wrap{ max-width:1240px; margin:0 auto; padding:18px; }

  /* tiles */
  .tiles{ display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .tile{ background:var(--card); border:1px solid var(--line); border-radius:15px; padding:15px 16px; }
  .tile .n{ font-family:var(--disp); font-size:30px; font-weight:800; line-height:1; }
  .tile .l{ font-size:12.5px; color:var(--soft); font-weight:600; margin-top:6px; }
  .tile.alert .n{ color:#B42318; }

  .card{ background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; }
  .card .hd{ display:flex; align-items:center; gap:10px; padding:13px 16px; border-bottom:1px solid var(--line); }
  .card .hd h2{ font-family:var(--disp); font-size:16px; margin:0; font-weight:700; }

  #map{ height:460px; }
  .map-sm{ height:340px; border-radius:14px; }

  /* dispatch table */
  .toolbar{ display:flex; gap:9px; flex-wrap:wrap; align-items:center; margin-bottom:13px; }
  .input,select{ font-family:var(--body); font-size:13.5px; padding:9px 11px; border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--ink); }
  .input:focus,select:focus{ outline:2px solid var(--gold); }
  .btn{ font-family:var(--body); font-weight:600; font-size:13.5px; border:0; border-radius:10px; padding:9px 14px; cursor:pointer; }
  .btn-maroon{ background:var(--maroon); color:#fff; } .btn-gold{ background:var(--gold); color:#fff; }
  .btn-ghost{ background:#fff; color:var(--maroon); border:1px solid var(--line); }
  .btn:active{ transform:translateY(1px); }

  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--soft); padding:10px 12px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--card); cursor:pointer; }
  td{ padding:11px 12px; border-bottom:1px solid rgba(110,16,35,.06); vertical-align:middle; }
  tr:hover td{ background:rgba(226,165,59,.06); }
  .who b{ font-weight:700; } .who small{ color:var(--soft); display:block; font-size:11.5px; }

  .pill{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; padding:4px 9px; border-radius:20px; white-space:nowrap; }
  .st-scheduled{ background:#ECE6DB; color:#7A6A5C; }
  .st-assigned{ background:#E7EEF8; color:#1A5CA8; }
  .st-en_route{ background:#FBEFD7; color:#9A6B12; }
  .st-arrived{ background:#FBEFD7; color:#9A6B12; }
  .st-picked_up{ background:#E4F2EE; color:#1F6E5E; }
  .st-in_transit{ background:#E4F2EE; color:#1F6E5E; }
  .st-completed{ background:#E8E8E8; color:#555; }
  .st-cancelled{ background:#FBE3E3; color:#B42318; }
  .st-delayed{ background:#FBE3E3; color:#B42318; }

  .linkbtn{ font-size:11.5px; color:var(--maroon); cursor:pointer; text-decoration:underline; background:none; border:0; padding:0; }

  /* driver cards */
  .dgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
  .dcard{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; }
  .avatar{ width:42px;height:42px;border-radius:50%; background:linear-gradient(135deg,var(--maroon),var(--maroon2)); color:#fff; display:grid;place-items:center; font-weight:700; }

  /* modal */
  .modal{ position:fixed; inset:0; z-index:2000; background:rgba(42,18,22,.5); display:none; align-items:center; justify-content:center; padding:18px; }
  .modal.show{ display:flex; }
  .sheet{ background:var(--card); border-radius:18px; width:100%; max-width:520px; max-height:90vh; overflow:auto; box-shadow:0 24px 60px rgba(0,0,0,.4); }
  .sheet .hd{ display:flex; align-items:center; justify-content:space-between; padding:15px 18px; border-bottom:1px solid var(--line); }
  .sheet .hd h3{ font-family:var(--disp); margin:0; font-size:18px; font-weight:800; }
  .sheet .bd{ padding:18px; }
  .fld{ display:block; font-size:12px; font-weight:600; color:var(--soft); margin:12px 0 5px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .x{ background:none; border:0; font-size:20px; cursor:pointer; color:var(--soft); }

  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(140%); z-index:3000; background:var(--ink); color:#fff; padding:12px 18px; border-radius:12px; font-size:14px; font-weight:600; box-shadow:0 10px 30px rgba(0,0,0,.3); transition:transform .3s; }
  .toast.show{ transform:translateX(-50%) translateY(0); }
  .empty{ text-align:center; color:var(--soft); padding:40px; font-size:14px; }
</style>
</head>
<body>
  <header>
    <div class="logo">W</div>
    <div><h1>Wayfare</h1></div>
    <div class="sub">Event Transportation · Dispatch</div>
    <div class="net"><span class="dot" id="netdot"></span><span id="netlabel">Connecting…</span></div>
  </header>
  <nav id="nav">
    <button data-tab="dashboard" class="on">Dashboard</button>
    <button data-tab="dispatch">Dispatch board</button>
    <button data-tab="drivers">Drivers</button>
    <button data-tab="timeline">Timeline</button>
    <button data-tab="feedback">Feedback</button>
  </nav>
  <div class="wrap" id="view"></div>

  <!-- guest modal -->
  <div class="modal" id="guestModal"><div class="sheet">
    <div class="hd"><h3 id="gm-title">Add guest pickup</h3><button class="x" onclick="closeGuest()">✕</button></div>
    <div class="bd">
      <input type="hidden" id="gm-id"/>
      <div class="grid2">
        <div><label class="fld">First name</label><input class="input" id="gm-fn" style="width:100%"/></div>
        <div><label class="fld">Last name</label><input class="input" id="gm-ln" style="width:100%"/></div>
      </div>
      <div class="grid2">
        <div><label class="fld">Mobile</label><input class="input" id="gm-mobile" style="width:100%"/></div>
        <div><label class="fld">Email</label><input class="input" id="gm-email" style="width:100%"/></div>
      </div>
      <label class="fld">Pickup location</label>
      <input class="input" id="gm-addr" style="width:100%" placeholder="Hotel / airport / station"/>
      <p style="font-size:11.5px;color:var(--soft);margin:6px 0 0">Tip: click the mini-map to drop the exact pickup point.</p>
      <div id="gm-map" class="map-sm" style="margin-top:8px"></div>
      <div class="grid2">
        <div><label class="fld">Pickup time</label><input class="input" id="gm-time" type="time" style="width:100%"/></div>
        <div><label class="fld">Passengers</label><input class="input" id="gm-pax" type="number" min="1" value="1" style="width:100%"/></div>
      </div>
      <div class="grid2">
        <div><label class="fld">Bags</label><input class="input" id="gm-bags" type="number" min="0" value="0" style="width:100%"/></div>
        <div><label class="fld">Assign driver</label><select id="gm-driver" style="width:100%"></select></div>
      </div>
      <label class="fld">Special instructions</label>
      <input class="input" id="gm-notes" style="width:100%" placeholder="e.g. wheelchair, extra luggage"/>
      <button class="btn btn-maroon" style="width:100%;margin-top:16px" onclick="saveGuest()">Save pickup</button>
    </div>
  </div></div>

  <div class="toast" id="toast"></div>

<script>
/* ============================ CONFIG ============================ */
const SERVER_URL = "https://wayfare-relay.onrender.com"; // ← change to your Render relay URL
const CFG = { etaSpeedKmh: 32 };

/* ============================ STATE ============================ */
let GUESTS={}, DRIVERS={}, EVENTS=[], FEEDBACK=[], VENUE={name:"Venue",lat:40.5188,lng:-74.3294};
let tab="dashboard", net={connected:false};
let filterText="", filterStatus="all", sortKey="pickupTime", sortDir=1;
let map=null, gmap=null, gmapMarker=null, dMarkers={}, pMarkers={};
const $=s=>document.querySelector(s);

/* ============================ SOCKET ============================ */
let socket=null;
try{
  socket=io(SERVER_URL,{ transports:["websocket","polling"] });
  socket.on("connect",()=>{ net.connected=true; paintNet(); socket.emit("getSnapshot"); });
  socket.on("disconnect",()=>{ net.connected=false; paintNet(); });
  socket.on("connect_error",()=>{ net.connected=false; paintNet(); });
  socket.on("snapshot",(s)=>{ if(!s) return; GUESTS=s.guests||{}; DRIVERS=s.drivers||{}; EVENTS=s.events||[]; FEEDBACK=s.feedback||[]; if(s.venue) VENUE=s.venue; render(); });
  socket.on("guest",(g)=>{ if(g&&g.id){ GUESTS[g.id]=g; liveUpdate(); } });
  socket.on("guestGone",({id})=>{ delete GUESTS[id]; liveUpdate(); });
  socket.on("driver",(d)=>{ if(d&&d.id){ DRIVERS[d.id]=d; liveUpdate(); } });
  socket.on("driverLoc",({id,lat,lng,heading,ts})=>{ if(DRIVERS[id]){ Object.assign(DRIVERS[id],{lat,lng,heading,ts}); liveUpdate(); } });
  socket.on("event",(e)=>{ EVENTS.push(e); if(tab==="timeline") render(); });
  socket.on("feedback",(f)=>{ FEEDBACK.push(f); if(tab==="feedback") render(); });
}catch(e){ console.error(e); }
function paintNet(){ const d=$("#netdot"),l=$("#netlabel"); if(!d) return; d.className="dot "+(net.connected?"on":"off"); l.textContent=net.connected?"Live":"Offline"; }

/* ============================ HELPERS ============================ */
function haversine(a,b,c,d){ const R=6371,r=Math.PI/180; const dLat=(c-a)*r,dLng=(d-b)*r; const x=Math.sin(dLat/2)**2+Math.sin(dLng/2)**2*Math.cos(a*r)*Math.cos(c*r); return R*2*Math.asin(Math.sqrt(x)); }
function etaMin(g){ const d=DRIVERS[g.driverId]; if(!d||d.lat==null||g.pickupLat==null) return null;
  const target = (["picked_up","in_transit"].includes(g.status)) ? [VENUE.lat,VENUE.lng] : [g.pickupLat,g.pickupLng];
  const km=haversine(d.lat,d.lng,target[0],target[1]); return Math.max(1,Math.round(km/CFG.etaSpeedKmh*60)); }
function isDelayed(g){ if(["completed","cancelled"].includes(g.status)) return false; const e=etaMin(g); return e!=null && e>20; }
function statusLabel(s){ return ({scheduled:"Scheduled",assigned:"Assigned",en_route:"En route",arrived:"Arrived",picked_up:"Picked up",in_transit:"In transit",completed:"Completed",cancelled:"Cancelled"})[s]||s; }
function gname(g){ return (g.firstName||"")+" "+(g.lastName||""); }
function driverName(id){ return DRIVERS[id]?.name || "—"; }
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(window._t); window._t=setTimeout(()=>t.classList.remove("show"),2200); }
function trackLink(id){ const base=location.href.replace(/\/[^/]*$/,"/"); return base+"guest.html?g="+id; }

/* ============================ NAV ============================ */
document.querySelectorAll("#nav button").forEach(b=>b.onclick=()=>{ tab=b.dataset.tab; document.querySelectorAll("#nav button").forEach(x=>x.classList.toggle("on",x===b)); render(); });

/* ============================ RENDER ============================ */
function render(){ paintNet();
  if(tab==="dashboard") return renderDashboard();
  if(tab==="dispatch") return renderDispatch();
  if(tab==="drivers") return renderDrivers();
  if(tab==="timeline") return renderTimeline();
  if(tab==="feedback") return renderFeedback();
}
function liveUpdate(){ // light refresh without rebuilding inputs
  if(tab==="dashboard"){ paintTiles(); renderMapLayers(); }
  else if(tab==="dispatch"){ const tb=$("#dispatch-body"); if(tb) tb.innerHTML=dispatchRows(); paintDispatchCount(); }
  else if(tab==="drivers"){ render(); }
}

/* ---------- DASHBOARD ---------- */
function counts(){ const all=Object.values(GUESTS); return {
  total:all.length,
  awaiting:all.filter(g=>["scheduled","assigned","en_route","arrived"].includes(g.status)).length,
  picked:all.filter(g=>g.status==="picked_up").length,
  transit:all.filter(g=>g.status==="in_transit").length,
  completed:all.filter(g=>g.status==="completed").length,
  unassigned:all.filter(g=>!g.driverId && g.status!=="completed" && g.status!=="cancelled").length,
  delayed:all.filter(isDelayed).length }; }
function renderDashboard(){
  $("#view").innerHTML=`
    <div class="tiles" id="tiles"></div>
    <div class="card" style="margin-top:16px">
      <div class="hd"><h2>Live operations map</h2><span style="margin-left:auto;font-size:12px;color:var(--soft)" id="mapnote"></span></div>
      <div id="map"></div>
    </div>`;
  paintTiles(); initMap();
}
function paintTiles(){ const c=counts(); const t=$("#tiles"); if(!t) return;
  const tiles=[["Total guests",c.total,""],["Awaiting pickup",c.awaiting,""],["Picked up",c.picked,""],["In transit",c.transit,""],["Completed",c.completed,""],["Unassigned",c.unassigned,c.unassigned?"alert":""],["Delayed",c.delayed,c.delayed?"alert":""]];
  t.innerHTML=tiles.map(([l,n,cl])=>`<div class="tile ${cl}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
  const mn=$("#mapnote"); if(mn) mn.textContent=Object.values(DRIVERS).filter(d=>d.ts).length+" drivers reporting";
}
function initMap(){
  map=L.map("map",{zoomControl:true}).setView([VENUE.lat,VENUE.lng],12);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:19,attribution:"© OpenStreetMap © CARTO"}).addTo(map);
  L.marker([VENUE.lat,VENUE.lng],{icon:venueIcon()}).addTo(map).bindTooltip("★ "+VENUE.name,{permanent:false});
  dMarkers={}; pMarkers={}; renderMapLayers(); setTimeout(()=>map.invalidateSize(),200);
}
function venueIcon(){ return L.divIcon({className:"",html:`<div style="background:#2A1216;color:#E3B23C;font-weight:800;font-size:11px;padding:4px 9px;border-radius:8px;white-space:nowrap;border:1.5px solid #E3B23C">★ ${VENUE.name}</div>`,iconAnchor:[40,12]}); }
function driverIcon(d){ const init=(d.name||"D").split(" ").map(x=>x[0]).join("").slice(0,2); return L.divIcon({className:"",html:`<div style="display:flex;align-items:center;gap:4px;background:#6E1023;color:#fff;font-weight:800;font-size:11px;padding:4px 8px 4px 5px;border-radius:999px;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);white-space:nowrap"><svg width="14" height="14" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2" fill="#fff"/><circle cx="7.5" cy="18.5" r="2" fill="#fff"/><circle cx="16.5" cy="18.5" r="2" fill="#fff"/></svg>${init}</div>`,iconSize:[54,28],iconAnchor:[27,14]}); }
function pickIcon(){ return L.divIcon({className:"",html:`<div style="width:13px;height:13px;border-radius:50%;background:#C2902B;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,iconSize:[13,13],iconAnchor:[7,7]}); }
function renderMapLayers(){
  if(!map) return;
  Object.values(DRIVERS).forEach(d=>{ if(d.lat==null||!d.ts) { if(dMarkers[d.id]){map.removeLayer(dMarkers[d.id]);delete dMarkers[d.id];} return; }
    if(dMarkers[d.id]) dMarkers[d.id].setLatLng([d.lat,d.lng]).setIcon(driverIcon(d));
    else dMarkers[d.id]=L.marker([d.lat,d.lng],{icon:driverIcon(d)}).addTo(map).bindTooltip(()=>`<b>${d.name}</b><br>${d.vehicle.color} ${d.vehicle.make} ${d.vehicle.model} · ${d.vehicle.plate}`,{direction:"top"}); });
  Object.values(GUESTS).forEach(g=>{ const show=g.pickupLat!=null && !["completed","cancelled"].includes(g.status);
    if(!show){ if(pMarkers[g.id]){map.removeLayer(pMarkers[g.id]);delete pMarkers[g.id];} return; }
    if(pMarkers[g.id]) pMarkers[g.id].setLatLng([g.pickupLat,g.pickupLng]);
    else pMarkers[g.id]=L.marker([g.pickupLat,g.pickupLng],{icon:pickIcon()}).addTo(map).bindTooltip(()=>`<b>${gname(g)}</b><br>${g.pickupAddress||""}<br>${statusLabel(g.status)}`,{direction:"top"}); });
}

/* ---------- DISPATCH BOARD ---------- */
function renderDispatch(){
  $("#view").innerHTML=`
    <div class="toolbar">
      <input class="input" id="search" placeholder="Search guest, address, driver…" value="${filterText}" oninput="onSearch(this.value)" style="flex:1;min-width:200px"/>
      <select id="fstatus" onchange="filterStatus=this.value;refreshDispatch()">
        ${["all","scheduled","assigned","en_route","arrived","picked_up","in_transit","completed"].map(s=>`<option value="${s}" ${filterStatus===s?"selected":""}>${s==="all"?"All statuses":statusLabel(s)}</option>`).join("")}
      </select>
      <button class="btn btn-ghost" onclick="importDemo()">⇪ Bulk import (demo)</button>
      <button class="btn btn-maroon" onclick="openGuest()">+ Add pickup</button>
    </div>
    <div class="card">
      <div class="hd"><h2>Dispatch board</h2><span style="margin-left:auto;font-size:12.5px;color:var(--soft)" id="dispatch-count"></span></div>
      <div style="overflow:auto;max-height:64vh">
        <table>
          <thead><tr>
            ${[["who","Guest"],["pickupAddress","Pickup"],["pickupTime","Time"],["driverId","Driver"],["eta","ETA"],["status","Status"],["link","Link"]].map(([k,l])=>`<th onclick="setSort('${k}')">${l}${sortKey===k?(sortDir>0?" ▲":" ▼"):""}</th>`).join("")}
          </tr></thead>
          <tbody id="dispatch-body">${dispatchRows()}</tbody>
        </table>
      </div>
    </div>`;
  paintDispatchCount();
}
function onSearch(v){ filterText=v; const tb=$("#dispatch-body"); if(tb) tb.innerHTML=dispatchRows(); paintDispatchCount(); }
function refreshDispatch(){ const tb=$("#dispatch-body"); if(tb) tb.innerHTML=dispatchRows(); paintDispatchCount(); }
function setSort(k){ if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=1; } refreshDispatch(); renderDispatchHead(); }
function renderDispatchHead(){ if(tab==="dispatch") renderDispatch(); }
function paintDispatchCount(){ const el=$("#dispatch-count"); if(el) el.textContent=filteredGuests().length+" of "+Object.keys(GUESTS).length; }
function filteredGuests(){
  let arr=Object.values(GUESTS);
  if(filterStatus!=="all") arr=arr.filter(g=>g.status===filterStatus);
  if(filterText){ const q=filterText.toLowerCase(); arr=arr.filter(g=>(gname(g)+" "+(g.pickupAddress||"")+" "+driverName(g.driverId)).toLowerCase().includes(q)); }
  arr.sort((a,b)=>{ let x,y;
    if(sortKey==="who"){ x=gname(a); y=gname(b); }
    else if(sortKey==="driverId"){ x=driverName(a.driverId); y=driverName(b.driverId); }
    else if(sortKey==="eta"){ x=etaMin(a)??999; y=etaMin(b)??999; }
    else { x=a[sortKey]??""; y=b[sortKey]??""; }
    return (x>y?1:x<y?-1:0)*sortDir; });
  return arr;
}
function dispatchRows(){
  const arr=filteredGuests();
  if(!arr.length) return `<tr><td colspan="7"><div class="empty">No guests match. Add a pickup or adjust filters.</div></td></tr>`;
  return arr.map(g=>{ const e=etaMin(g); const delayed=isDelayed(g);
    return `<tr>
      <td class="who"><b>${gname(g)}</b><small>${g.passengers||1} pax · ${g.bags||0} bags · ${g.mobile||""}</small></td>
      <td>${g.pickupAddress||"—"}</td>
      <td>${g.pickupTime||"—"}</td>
      <td>
        <select onchange="assign('${g.id}',this.value)" style="font-size:12.5px;padding:6px 8px">
          <option value="">Unassigned</option>
          ${Object.values(DRIVERS).map(d=>`<option value="${d.id}" ${g.driverId===d.id?"selected":""}>${d.name}</option>`).join("")}
        </select>
      </td>
      <td>${["completed","cancelled"].includes(g.status)?"—":(e!=null?`${e} min`:"—")}</td>
      <td><span class="pill st-${delayed?'delayed':g.status}">${delayed?"⚠ Delayed":statusLabel(g.status)}</span></td>
      <td><button class="linkbtn" onclick="copyLink('${g.id}')">Copy</button> · <button class="linkbtn" onclick="editGuest('${g.id}')">Edit</button></td>
    </tr>`; }).join("");
}
function assign(guestId,driverId){ socket?.emit("assign",{guestId,driverId:driverId||null}); toast(driverId?("Assigned to "+driverName(driverId)):"Unassigned"); }
function copyLink(id){ const url=trackLink(id); navigator.clipboard?.writeText(url).then(()=>toast("Tracking link copied"),()=>toast(url)); }

/* ---------- DRIVERS ---------- */
function renderDrivers(){
  const arr=Object.values(DRIVERS);
  $("#view").innerHTML=`
    <div class="card"><div class="hd"><h2>Drivers & vehicles</h2><span style="margin-left:auto;font-size:12.5px;color:var(--soft)">${arr.filter(d=>d.ts).length} live</span></div>
    <div style="padding:14px"><div class="dgrid">
      ${arr.map(d=>{ const live=d.ts && (Date.now()-d.ts)<40000; const load=Object.values(GUESTS).filter(g=>g.driverId===d.id && !["completed","cancelled"].includes(g.status)).length;
        return `<div class="dcard">
          <div style="display:flex;gap:11px;align-items:center">
            <div class="avatar">${(d.name||"D").split(" ").map(x=>x[0]).join("").slice(0,2)}</div>
            <div style="flex:1"><b>${d.name}</b><div style="font-size:12px;color:var(--soft)">${d.phone||""}</div></div>
            <span class="pill ${live?'st-in_transit':'st-scheduled'}">${live?"● Live":"Offline"}</span>
          </div>
          <div style="margin-top:11px;font-size:13px;line-height:1.6">
            <div><b>${d.vehicle.color} ${d.vehicle.make} ${d.vehicle.model}</b></div>
            <div style="color:var(--soft)">Plate ${d.vehicle.plate} · seats ${d.vehicle.capacity} · ${d.vehicle.luggage} bags</div>
            <div style="margin-top:6px"><span class="pill st-assigned">${load} active pickup${load!==1?"s":""}</span></div>
          </div>
          <div style="margin-top:11px;display:flex;gap:8px">
            <button class="btn btn-ghost" style="flex:1;font-size:12.5px" onclick="toast('Masked call would connect via Twilio — ${d.phone}')">📞 Call (masked)</button>
          </div>
        </div>`; }).join("")}
    </div></div></div>`;
}

/* ---------- TIMELINE ---------- */
function renderTimeline(){
  const evs=[...EVENTS].reverse().slice(0,200);
  $("#view").innerHTML=`
    <div class="card"><div class="hd"><h2>Activity timeline</h2><span style="margin-left:auto;font-size:12.5px;color:var(--soft)">${EVENTS.length} events</span></div>
    <div style="padding:6px 0">
      ${evs.length?evs.map(e=>{ const g=GUESTS[e.guestId]; const tm=new Date(e.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
        return `<div style="display:flex;gap:12px;padding:11px 16px;border-bottom:1px solid rgba(110,16,35,.06)">
          <div style="font-family:var(--disp);font-weight:700;color:var(--maroon);min-width:64px">${tm}</div>
          <div><b>${g?gname(g):e.guestId}</b> — ${e.label}</div></div>`; }).join(""):`<div class="empty">No activity yet.</div>`}
    </div></div>`;
}

function renderFeedback(){
  const fb=[...FEEDBACK].reverse();
  const avg = fb.length ? (fb.reduce((s,f)=>s+f.rating,0)/fb.length) : 0;
  const okCount = fb.filter(f=>f.marketingOk).length;
  $("#view").innerHTML=`
    <div class="tiles" style="margin-bottom:14px">
      <div class="tile"><div class="n">${fb.length}</div><div class="l">Responses</div></div>
      <div class="tile"><div class="n">${avg?avg.toFixed(1):"—"}</div><div class="l">Avg rating</div></div>
      <div class="tile"><div class="n">${okCount}</div><div class="l">OK to market</div></div>
    </div>
    <div class="card"><div class="hd"><h2>Guest feedback</h2><span style="margin-left:auto;font-size:12.5px;color:var(--soft)">“How'd we do?” after drop-off</span></div>
    <div style="padding:6px 0">
      ${fb.length?fb.map(f=>{ const tm=new Date(f.ts).toLocaleString([],{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
        return `<div style="padding:12px 16px;border-bottom:1px solid rgba(110,16,35,.06)">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="color:#E3B23C;font-size:15px">${"★".repeat(f.rating)}<span style="color:#ddd">${"★".repeat(5-f.rating)}</span></div>
            <b>${f.name||"Guest"}</b>
            <span style="margin-left:auto;font-size:12px;color:var(--soft)">${tm}</span>
          </div>
          ${f.comment?`<div style="margin-top:5px;font-size:14px">“${f.comment}”</div>`:""}
          ${f.marketingOk
            ?`<div style="margin-top:6px;display:inline-block;font-size:11.5px;font-weight:700;color:var(--green);background:#E4F2EE;padding:2px 8px;border-radius:6px">✓ Approved for marketing use</div>`
            :`<div style="margin-top:6px;display:inline-block;font-size:11.5px;font-weight:600;color:var(--soft);background:#F0ECE4;padding:2px 8px;border-radius:6px">Not for marketing</div>`}
        </div>`; }).join(""):`<div class="empty">No feedback yet. It appears here after guests complete a trip and rate it.</div>`}
    </div></div>`;
}
function fillDriverSelect(sel,val){ sel.innerHTML=`<option value="">Unassigned</option>`+Object.values(DRIVERS).map(d=>`<option value="${d.id}" ${val===d.id?"selected":""}>${d.name}</option>`).join(""); }
function openGuest(){ $("#gm-title").textContent="Add guest pickup"; ["gm-id","gm-fn","gm-ln","gm-mobile","gm-email","gm-addr","gm-notes"].forEach(i=>$("#"+i).value=""); $("#gm-time").value=""; $("#gm-pax").value=1; $("#gm-bags").value=0; fillDriverSelect($("#gm-driver"),""); $("#guestModal").classList.add("show"); setTimeout(initGmap,80); window._gpick={lat:VENUE.lat,lng:VENUE.lng}; }
function editGuest(id){ const g=GUESTS[id]; if(!g) return; $("#gm-title").textContent="Edit pickup"; $("#gm-id").value=id; $("#gm-fn").value=g.firstName||""; $("#gm-ln").value=g.lastName||""; $("#gm-mobile").value=g.mobile||""; $("#gm-email").value=g.email||""; $("#gm-addr").value=g.pickupAddress||""; $("#gm-time").value=g.pickupTime||""; $("#gm-pax").value=g.passengers||1; $("#gm-bags").value=g.bags||0; $("#gm-notes").value=g.instructions||""; fillDriverSelect($("#gm-driver"),g.driverId); window._gpick={lat:g.pickupLat||VENUE.lat,lng:g.pickupLng||VENUE.lng}; $("#guestModal").classList.add("show"); setTimeout(initGmap,80); }
function closeGuest(){ $("#guestModal").classList.remove("show"); if(gmap){ gmap.remove(); gmap=null; } }
function initGmap(){ if(gmap){ gmap.remove(); gmap=null; } gmap=L.map("gm-map").setView([window._gpick.lat,window._gpick.lng],12); L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:19}).addTo(gmap); gmapMarker=L.marker([window._gpick.lat,window._gpick.lng],{draggable:true,icon:pickIcon()}).addTo(gmap); gmapMarker.on("dragend",e=>{ const p=e.target.getLatLng(); window._gpick={lat:p.lat,lng:p.lng}; }); gmap.on("click",e=>{ window._gpick={lat:e.latlng.lat,lng:e.latlng.lng}; gmapMarker.setLatLng(e.latlng); }); setTimeout(()=>gmap.invalidateSize(),120); }
function saveGuest(){ const fn=$("#gm-fn").value.trim(); if(!fn){ toast("First name required"); return; }
  const g={ id:$("#gm-id").value||undefined, firstName:fn, lastName:$("#gm-ln").value.trim(), mobile:$("#gm-mobile").value.trim(), email:$("#gm-email").value.trim(), pickupAddress:$("#gm-addr").value.trim(), pickupLat:window._gpick.lat, pickupLng:window._gpick.lng, pickupTime:$("#gm-time").value, passengers:+$("#gm-pax").value||1, bags:+$("#gm-bags").value||0, instructions:$("#gm-notes").value.trim(), driverId:$("#gm-driver").value||null, destination:VENUE.name };
  socket?.emit("saveGuest",g,(res)=>{ if(res&&res.ok){ if(g.driverId) socket.emit("assign",{guestId:res.id,driverId:g.driverId}); toast("Pickup saved"); closeGuest(); } else toast("Save failed"); });
}
function importDemo(){
  const rows=[
    {firstName:"Grace",lastName:"Kim",mobile:"+1 555 7001",email:"grace.kim@email.com",pickupAddress:"Embassy Suites",pickupLat:40.55,pickupLng:-74.33,pickupTime:"10:30",passengers:2,bags:2},
    {firstName:"Diego",lastName:"Ramos",mobile:"+1 555 7002",email:"diego.ramos@email.com",pickupAddress:"Newark Airport — Terminal C",pickupLat:40.6921,pickupLng:-74.1869,pickupTime:"10:40",passengers:1,bags:1},
    {firstName:"Aarav",lastName:"Shah",mobile:"+1 555 1001",email:"aarav.shah@email.com",pickupAddress:"Newark Liberty Airport — Terminal B",pickupTime:"09:35",passengers:2,bags:3}
  ];
  socket?.emit("importGuests",rows,(res)=>{ if(res&&res.ok) toast(`Imported: ${res.created} new, ${res.updated} updated`); });
}

render();
</script>
