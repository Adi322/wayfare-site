<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Track your ride · Wayfare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root{ --maroon:#6E1023; --gold:#C2902B; --gold2:#E3B23C; --ink:#2A1216; --paper:#F7F0E6; --card:#FFFDF8;
         --line:rgba(110,16,35,.12); --soft:#9b8b80; --green:#1F6E5E; --disp:'Bricolage Grotesque',sans-serif; --body:'Inter',sans-serif; }
  *{box-sizing:border-box} body{ margin:0; font-family:var(--body); color:var(--ink); background:var(--paper); }
  .disp{ font-family:var(--disp); }
  header{ background:var(--maroon); color:#fff; padding:13px 16px; display:flex; align-items:center; gap:9px; }
  header .logo{ width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--gold2),var(--gold));display:grid;place-items:center;color:var(--maroon);font-weight:800;font-size:13px;}
  header h1{ font-family:var(--disp); font-size:15px; margin:0; font-weight:800; }
  #map{ height:38vh; width:100%; }
  .sheet{ max-width:560px; margin:-26px auto 0; position:relative; z-index:5; background:var(--card); border-radius:22px 22px 0 0; box-shadow:0 -10px 30px rgba(110,16,35,.12); padding:18px 18px 26px; }
  .status{ font-family:var(--disp); font-size:22px; font-weight:800; letter-spacing:-.01em; }
  .sub{ color:var(--soft); font-size:13.5px; margin-top:2px; }
  .eta{ display:inline-flex; align-items:baseline; gap:6px; margin-top:12px; background:#E4F2EE; color:var(--green); padding:7px 13px; border-radius:13px; font-weight:700; }
  .eta b{ font-family:var(--disp); font-size:24px; }
  .offline-note{ margin-top:12px; background:#FBEFD7; color:#9A6B12; border-radius:12px; padding:10px 12px; font-size:12.5px; font-weight:600; }
  .drv{ display:flex; align-items:center; gap:12px; margin-top:14px; padding-top:14px; border-top:1px solid var(--line); }
  .avatar{ width:48px;height:48px;border-radius:50%; background:linear-gradient(135deg,var(--maroon),#8a1c33); color:#fff; display:grid;place-items:center; font-weight:800; font-size:18px; }
  .veh{ margin-top:11px; background:#F4EEE3; border-radius:13px; padding:11px 13px; display:flex; align-items:center; gap:11px; font-size:13.5px; }
  .btn{ font-family:var(--body); font-weight:700; font-size:15px; border:0; border-radius:13px; padding:13px; cursor:pointer; width:100%; }
  .btn-maroon{ background:var(--maroon); color:#fff; } .btn-ghost{ background:#fff; color:var(--maroon); border:1.5px solid var(--line); }
  /* compact horizontal step tracker (single-screen, Uber-style) */
  .steps-row{ display:flex; gap:4px; margin-top:16px; }
  .srow{ flex:1; text-align:center; position:relative; }
  .srow .dot2{ display:grid; place-items:center; width:22px; height:22px; margin:0 auto 5px; border-radius:50%; border:2px solid #d8cbbd; color:#fff; font-size:11px; background:#d8cbbd; }
  .srow .lbl{ font-size:11px; color:var(--soft); text-transform:capitalize; }
  .srow.done .dot2{ background:var(--green); border-color:var(--green); }
  .srow.done .lbl{ color:var(--green); font-weight:600; }
  .srow.cur .dot2{ background:var(--maroon); border-color:var(--maroon); animation:pulse 1.4s infinite; }
  .srow.cur .lbl{ color:var(--maroon); font-weight:700; }
  .srow:not(:last-child):after{ content:""; position:absolute; top:11px; left:60%; width:80%; height:2px; background:#e4d9cb; z-index:-0; }
  .srow.done:not(:last-child):after{ background:var(--green); }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(110,16,35,.4);} 50%{ box-shadow:0 0 0 5px rgba(110,16,35,0);} }
  .trip-line{ margin-top:14px; font-size:13px; color:var(--ink); }
  .center{ text-align:center; padding:50px 20px; color:var(--soft); }
</style>
</head>
<body>
  <header><div class="logo">W</div><h1>Your ride</h1></header>
  <div id="map"></div>
  <div class="sheet" id="sheet"><div class="center">Loading your trip…</div></div>
  <audio id="remoteAudio" autoplay playsinline></audio>
  <div id="callOverlay" style="display:none;position:fixed;inset:0;z-index:3000;background:rgba(42,18,22,.92);color:#fff;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:24px">
    <div id="callAvatar" style="width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,#E3B23C,#C2902B);color:#6E1023;display:grid;place-items:center;font-weight:800;font-size:30px">D</div>
    <div><div id="callName" style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px"></div><div id="callState" style="opacity:.8;font-size:14px;margin-top:4px">Calling…</div></div>
    <div style="font-size:12px;opacity:.6;max-width:280px">Private app-to-app call — no numbers shared.<br>Both apps must be open · uses mic + data.</div>
    <div style="display:flex;gap:22px;margin-top:6px">
      <button id="gAcceptBtn" onclick="acceptCall()" style="display:none;background:#1F6E5E;color:#fff;border:0;border-radius:999px;width:64px;height:64px;font-size:26px;cursor:pointer">📞</button>
      <button onclick="hangUp()" style="background:#B42318;color:#fff;border:0;border-radius:999px;width:64px;height:64px;font-size:26px;cursor:pointer">📵</button>
    </div>
  </div>
<script>
const SERVER_URL="https://wayfare-relay.onrender.com"; // ← your Render relay URL
const GID=new URLSearchParams(location.search).get("g");
let GUESTS={}, DRIVERS={}, VENUE={name:"Venue",lat:40.5188,lng:-74.3294};
let map=null, dMarker=null, pMarker=null, vMarker=null, routeLine=null;
const $=s=>document.querySelector(s);
const CFG={ etaSpeedKmh:32 };

let socket=io(SERVER_URL,{transports:["websocket","polling"]});
socket.on("connect",()=>{ if(GID) socket.emit("guestHello",{id:GID}); });
socket.on("snapshot",s=>{ if(!s)return; GUESTS=s.guests||{}; DRIVERS=s.drivers||{}; if(s.venue)VENUE=s.venue; ensureMap(); render(); });
socket.on("guest",g=>{ if(g&&g.id){GUESTS[g.id]=g; render();} });
socket.on("driver",d=>{ if(d&&d.id){DRIVERS[d.id]=d; render();} });
socket.on("driverLoc",({id,lat,lng})=>{ if(DRIVERS[id]){ DRIVERS[id].lat=lat; DRIVERS[id].lng=lng; DRIVERS[id].ts=Date.now(); render(); } });
socket.on("driverGone",({id})=>{ if(DRIVERS[id]) delete DRIVERS[id]; render(); });
// refresh every 20s so "reconnecting" appears if the driver's location goes stale
setInterval(()=>{ if(GID && g() && !(g().status==="completed" && window._fbShown)) render(); }, 20000);

/* ---------- Click-to-call: WebRTC peer-to-peer audio (open-source, free STUN) ---------- */
// Optional TURN relay for strict networks. Self-host coturn (free, open-source) and fill these in.
// Leave url:"" to use free STUN only (works on most WiFi/cellular).
const TURN={ url:"", username:"", credential:"" }; // e.g. url:"turn:YOUR_SERVER:3478"
const ICE={ iceServers:[
  {urls:"stun:stun.l.google.com:19302"},
  {urls:"stun:stun1.l.google.com:19302"},
  ...(TURN.url?[{urls:TURN.url,username:TURN.username,credential:TURN.credential}]:[])
] };
let pc=null, localStream=null, pendingOffer=null, callDriverId=null;
function callUI(show,name,state,showAccept){ const o=$("#callOverlay"); o.style.display=show?"flex":"none"; if(name!=null){ $("#callName").textContent=name; $("#callAvatar").textContent=(name||"D").split(" ").map(x=>x[0]).join("").slice(0,2); } if(state!=null) $("#callState").textContent=state; const ab=$("#gAcceptBtn"); if(ab) ab.style.display=showAccept?"block":"none"; }
async function makePc(driverId){
  callDriverId=driverId;
  localStream=await navigator.mediaDevices.getUserMedia({audio:true});
  pc=new RTCPeerConnection(ICE);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack=e=>{ const a=$("#remoteAudio"); a.srcObject=e.streams[0]; a.play&&a.play().catch(()=>{}); callUI(true,null,"Connected",false); };
  pc.onicecandidate=e=>{ if(e.candidate) socket.emit("callIce",{target:"driver",guestId:GID,driverId:callDriverId,candidate:e.candidate}); };
  pc.onconnectionstatechange=()=>{ if(["disconnected","failed","closed"].includes(pc.connectionState)) hangUp(); };
}
// Guest places a call to their driver (outgoing)
async function startCall(){
  const gu=g(); if(!gu||!gu.driverId){ alert("No driver assigned yet."); return; }
  const d=DRIVERS[gu.driverId];
  try{
    callUI(true, d?d.name:"Driver", "Calling…", false);
    await makePc(gu.driverId);
    const offer=await pc.createOffer(); await pc.setLocalDescription(offer);
    socket.emit("callOffer",{target:"driver",guestId:GID,driverId:gu.driverId,sdp:offer,name:(gu.firstName||"Guest")});
  }catch(err){ alert("Couldn't start the call — please allow microphone access."); hangUp(); }
}
// Driver calls the guest (incoming) — show accept button
socket.on("callOffer", async m=>{
  if(!m) return; pendingOffer=m; callDriverId=m.driverId;
  const d=DRIVERS[m.driverId];
  callUI(true, m.name||(d?d.name:"Driver"), "Incoming call…", true);
  socket.emit("callRinging",{target:"driver",guestId:GID,driverId:m.driverId});
});
async function acceptCall(){
  if(!pendingOffer) return;
  try{
    await makePc(pendingOffer.driverId);
    await pc.setRemoteDescription(pendingOffer.sdp);
    const answer=await pc.createAnswer(); await pc.setLocalDescription(answer);
    socket.emit("callAnswer",{target:"driver",guestId:GID,driverId:pendingOffer.driverId,sdp:answer});
    pendingOffer=null; callUI(true,null,"Connected",false);
  }catch(e){ alert("Please allow microphone access to answer."); hangUp(); }
}
function hangUp(){ try{ if(pc) pc.close(); }catch(e){} pc=null; if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  if(callDriverId) socket.emit("callEnd",{target:"driver",guestId:GID,driverId:callDriverId}); pendingOffer=null; callDriverId=null; callUI(false); }
socket.on("callAnswer", async m=>{ if(pc&&m&&m.sdp){ try{ await pc.setRemoteDescription(m.sdp); callUI(true,null,"Connected",false); }catch(e){} } });
socket.on("callIce", async m=>{ if(pc&&m&&m.candidate){ try{ await pc.addIceCandidate(m.candidate); }catch(e){} } });
socket.on("callRinging", ()=> callUI(true,null,"Ringing…",false));
socket.on("callDecline", ()=>{ callUI(true,null,"Driver unavailable",false); setTimeout(hangUp,1500); });
socket.on("callEnd", ()=> hangUp());

/* ---------- Feedback ---------- */
function submitFeedback(){
  const rating=window._fbRating||0; if(!rating){ alert("Tap the stars to rate first."); return; }
  const comment=($("#fbComment")&&$("#fbComment").value)||"";
  const marketingOk=!!($("#fbConsent")&&$("#fbConsent").checked);
  socket.emit("feedback",{guestId:GID,rating,comment,marketingOk},()=>{});
  const card=$("#fbCard"); if(card) card.innerHTML=`<div class="status" style="font-size:19px">Thank you! 🙏</div><div class="sub">Your feedback helps us improve.${marketingOk?" Thanks for letting us share it.":""}</div>`;
}
function setStars(n){ window._fbRating=n; for(let i=1;i<=5;i++){ const el=document.getElementById("star"+i); if(el) el.style.opacity=i<=n?"1":".3"; } }

function haversine(a,b,c,d){ const R=6371,r=Math.PI/180; const dLat=(c-a)*r,dLng=(d-b)*r; const x=Math.sin(dLat/2)**2+Math.sin(dLng/2)**2*Math.cos(a*r)*Math.cos(c*r); return R*2*Math.asin(Math.sqrt(x)); }
function g(){ return GUESTS[GID]; }
function statusText(s){ return ({scheduled:"Pickup scheduled",assigned:"Driver assigned",en_route:"Your driver is on the way",arrived:"Your driver has arrived",picked_up:"You're on board",in_transit:"On the way to the venue",completed:"Arrived — trip complete",cancelled:"Trip cancelled"})[s]||s; }
function statusSub(s){ return ({scheduled:"We'll assign a driver shortly.",assigned:"Your driver will head your way soon.",en_route:"Track them on the map below.",arrived:"Please head to your pickup point.",picked_up:"Sit back and relax.",in_transit:"Almost there.",completed:"Thanks for riding with us!",cancelled:"Contact the event desk for help."})[s]||""; }

function ensureMap(){ if(map) return; map=L.map("map",{zoomControl:true}).setView([VENUE.lat,VENUE.lng],12);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:19,attribution:"© OpenStreetMap © CARTO"}).addTo(map); }
function dIcon(){ return L.divIcon({className:"",html:`<div style="background:#6E1023;color:#fff;padding:5px 7px;border-radius:999px;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4)"><svg width="16" height="16" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2" fill="#fff"/><circle cx="7.5" cy="18.5" r="2" fill="#fff"/><circle cx="16.5" cy="18.5" r="2" fill="#fff"/></svg></div>`,iconSize:[34,34],iconAnchor:[17,17]}); }
function pIcon(){ return L.divIcon({className:"",html:`<div style="font-size:24px">📍</div>`,iconSize:[24,24],iconAnchor:[12,24]}); }
function vIcon(){ return L.divIcon({className:"",html:`<div style="background:#2A1216;color:#E3B23C;font-weight:800;font-size:10px;padding:3px 7px;border-radius:7px;border:1.5px solid #E3B23C;white-space:nowrap">★ ${VENUE.name}</div>`,iconAnchor:[34,10]}); }

function render(){
  const gu=g();
  if(!GID || !gu){ $("#sheet").innerHTML=`<div class="center">We couldn't find this trip.<br>Please check your tracking link.</div>`; return; }
  const d=DRIVERS[gu.driverId];
  // Once the trip is complete and the feedback form is on screen, stop re-rendering
  // the sheet so live updates can't wipe what the guest is typing.
  if(gu.status==="completed" && window._fbShown){ return; }
  if(gu.status==="completed") window._fbShown=true;
  // Is the driver actively sharing? (location gone stale = lost connection / logged out)
  const driverStale = d && d.ts && (Date.now()-d.ts > 60000);
  const driverLive = d && d.lat!=null && !driverStale;
  // map layers
  if(map){
    const pickup=[gu.pickupLat,gu.pickupLng]; const onway=["picked_up","in_transit"].includes(gu.status);
    const target=onway?[VENUE.lat,VENUE.lng]:pickup;
    if(gu.pickupLat!=null){ if(pMarker)pMarker.setLatLng(pickup); else pMarker=L.marker(pickup,{icon:pIcon()}).addTo(map).bindTooltip("Pickup",{direction:"top"}); }
    if(vMarker)vMarker.setLatLng([VENUE.lat,VENUE.lng]); else vMarker=L.marker([VENUE.lat,VENUE.lng],{icon:vIcon()}).addTo(map);
    if(driverLive){
      if(dMarker)dMarker.setLatLng([d.lat,d.lng]); else dMarker=L.marker([d.lat,d.lng],{icon:dIcon()}).addTo(map).bindTooltip("Your driver",{direction:"top"});
      // route highlight from driver to their current target
      const line=[[d.lat,d.lng], target];
      if(routeLine){ routeLine.setLatLngs(line); } else { routeLine=L.polyline(line,{color:"#6E1023",weight:4,opacity:.7,dashArray:"2,9",lineCap:"round"}).addTo(map); }
      try{ map.fitBounds(line,{padding:[55,55],maxZoom:14}); }catch(e){}
    } else {
      if(dMarker){ map.removeLayer(dMarker); dMarker=null; }
      if(routeLine){ map.removeLayer(routeLine); routeLine=null; }
      if(gu.pickupLat!=null) map.setView(pickup,13);
    }
  }
  // eta
  let eta=null; if(d&&d.lat!=null){ const onway=["picked_up","in_transit"].includes(gu.status); const t=onway?[VENUE.lat,VENUE.lng]:[gu.pickupLat,gu.pickupLng]; eta=Math.max(1,Math.round(haversine(d.lat,d.lng,t[0],t[1])/CFG.etaSpeedKmh*60)); }
  const order={scheduled:0,assigned:0,en_route:1,arrived:2,picked_up:3,in_transit:3,completed:4}; const cur=order[gu.status]??0;
  const showEta=["en_route","arrived","picked_up","in_transit"].includes(gu.status) && driverLive && eta!=null;
  const assignedActive=["en_route","arrived","picked_up","in_transit"].includes(gu.status);
  $("#sheet").innerHTML=`
    <div class="status">${statusText(gu.status)}</div>
    <div class="sub">${statusSub(gu.status)}</div>
    ${showEta?`<div class="eta">ETA <b>${eta}</b> min</div>`:""}
    ${d&&assignedActive&&!driverLive?`<div class="offline-note">📡 Reconnecting to your driver… their live location is paused. Hang tight — it'll resume automatically.</div>`:""}
    ${d?`
      <div class="drv">
        <div class="avatar" ${d.photo?`style="background-image:url('${d.photo}');background-size:cover;background-position:center"`:""}>${d.photo?"":(d.name||"D").split(" ").map(x=>x[0]).join("").slice(0,2)}</div>
        <div style="flex:1"><div style="font-weight:700;font-size:17px">${d.name}</div><div class="sub">${driverLive?"Your driver · live":"Your driver"}</div></div>
        <button class="btn btn-ghost" style="width:auto;padding:10px 14px" onclick="startCall()">📞 Call</button>
      </div>
      <div class="veh">
        <div style="font-size:24px">🚐</div>
        <div style="flex:1"><b>${d.vehicle.color} ${d.vehicle.make} ${d.vehicle.model}</b><div class="sub">Seats ${d.vehicle.capacity} · ${d.vehicle.plate}</div></div>
      </div>`:`<div class="veh"><div style="font-size:22px">⏳</div><div>Waiting for a driver to be assigned…</div></div>`}
    <div class="steps-row">
      ${[["en route","en_route"],["arrived","arrived"],["picked up","picked_up"],["venue","completed"]].map((s,i)=>`<div class="srow ${cur>i?'done':''} ${cur===i+1?'cur':''}"><span class="dot2">${cur>i?'✓':''}</span><span class="lbl">${s[0]}</span></div>`).join("")}
    </div>
    <div class="trip-line"><b>Pickup</b> · ${gu.pickupAddress||"—"}</div>
    ${gu.status==="completed"?`
    <div id="fbCard" style="margin-top:16px;padding-top:14px;border-top:1px solid var(--line)">
      <div class="status" style="font-size:19px">How'd we do?</div>
      <div class="sub">Rate your ride with ${d?d.name:"your driver"}.</div>
      <div style="font-size:34px;letter-spacing:6px;margin:10px 0;cursor:pointer">
        ${[1,2,3,4,5].map(i=>`<span id="star${i}" onclick="setStars(${i})" style="opacity:.3">⭐</span>`).join("")}
      </div>
      <textarea id="fbComment" placeholder="Anything you'd like to share? (optional)" style="width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:14px;min-height:64px"></textarea>
      <label style="display:flex;gap:9px;align-items:flex-start;margin:12px 0;font-size:13px;color:var(--ink);cursor:pointer">
        <input type="checkbox" id="fbConsent" style="margin-top:2px;width:18px;height:18px;accent-color:#6E1023">
        <span>You may use my feedback (and first name) in marketing and promotional materials.</span>
      </label>
      <button class="btn" style="background:#6E1023;color:#fff" onclick="submitFeedback()">Send feedback</button>
    </div>`:""}`;
}
if(!GID){ $("#sheet").innerHTML=`<div class="center">No trip specified.<br>Open the tracking link from your message.</div>`; }
</script>
</body>
</html>
